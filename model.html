<!-- Your modal HTML structure -->
<div class="modal fade" id="validationModal" tabindex="-1" aria-labelledby="validationModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal-content animated fadeInUp">
            <div class="modal-header animated slideInDown">
                <a class="navbar-brand p-0">
                    <h5><img src="img/Ejense_logo.jpg" class="img-fluid rounded" style="width: 45px; height: 45px;"> Ejense Technology </h5>
                </a>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body animated fadeIn">
                <h5 id="validationMessage"></h5>
            </div>
            <div class="modal-footer animated slideInUp">
                <button type="button" class="btn btn-dark" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
